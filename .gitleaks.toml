# Gitleaks Security Scan Configuration
title = "DevSecOps SSDLC Gitleaks Configuration"

[allowlist]
description = "Global allowlist for false positives, UI mocks, or documentation examples"
paths = [
  '''gitleaks\.toml''',
  '''README\.md''',
  '''docs/.*''',
  '''scripts/.*''',
  '''app\.js''',
  '''index\.html''',
  '''src/server\.js'''
]

regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''MOCK_.*'''
]

# Regras personalizadas adicionais se necessário
[[rules]]
id = "generic-api-key-strict"
description = "Deteção de API Keys genéricas com elevado padrão de entropia"
regex = '''(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*["']([A-Za-z0-9_\-]{20,})["']'''
tags = ["key", "secret", "owasp-a07"]

[[rules]]
id = "jwt-token"
description = "Deteção de JSON Web Tokens (JWT) expostos"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
tags = ["jwt", "token"]
