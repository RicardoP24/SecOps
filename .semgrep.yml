rules:
  - id: detect-eval-with-code
    patterns:
      - pattern: eval(...)
    message: "Uso perigoso da função eval() detetado! Isso pode levar a RCE (Remote Code Execution) - OWASP A03:2021-Injection."
    languages: [javascript, typescript, php]
    severity: ERROR

  - id: detect-php-command-injection
    patterns:
      - pattern-either:
          - pattern: system(...)
          - pattern: shell_exec(...)
          - pattern: exec(...)
    message: "Deteção de Execução de Comandos do Sistema Operativo em PHP (Command Injection - RCE) - OWASP A03."
    languages: [php]
    severity: ERROR

  - id: detect-php-sqli
    patterns:
      - pattern: $CONN->query("... " . $VAR . " ...")
    message: "Concatenação direta de variáveis em query SQL em PHP. Possível SQL Injection - OWASP A03."
    languages: [php]
    severity: ERROR

  - id: detect-php-unserialize
    patterns:
      - pattern: unserialize(...)
    message: "Uso de unserialize() com dados não confiáveis pode levar a deserealização insegura de objetos (RCE) - OWASP A08."
    languages: [php]
    severity: ERROR

  - id: detect-hardcoded-credentials
    patterns:
      - pattern-either:
          - pattern: $X = "bearer $TOKEN"
          - pattern: const $SECRET = "...";
          - pattern: $SECRET = "sk_live_...";
    message: "Evite armazenar credenciais ou tokens diretamente no código fonte."
    languages: [javascript, typescript, php]
    severity: WARNING
